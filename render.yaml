# Render blueprint — deploy the backend + a managed Postgres in one click.
# In the Render dashboard: New > Blueprint, point it at this repo.
# Then fill the secret env vars (marked sync:false) in the dashboard.
services:
  - type: web
    name: hoy-backend
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true        # Render generates a stable secret
      - key: ALLOWED_ORIGIN
        sync: false                # e.g. https://app.yourbrand.so
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hoy-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_KEY
        sync: false
      - key: S3_SECRET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_BASE
        sync: false
      - key: IDENTITY_API_KEY
        sync: false
      - key: IDENTITY_API_URL
        sync: false
      - key: IDENTITY_WEBHOOK_SECRET
        sync: false
databases:
  - name: hoy-db
    plan: free
